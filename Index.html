
<!DOCTYPE html>
<html lang="en">
<head>

	<!-- Position the map with Cascading Style Sheet (CSS) -->
  <style>
    body { margin:0; padding:0; }
    #map { position: absolute; top:0; bottom:0; right:0; left:0; }
  </style>

	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>GPX - Leaflet</title>
	
	<link href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.min.css" rel="stylesheet"></link>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.min.js"></script>


		
</head>
<body>

<div id="map" ></div>


<script>


//add an empty map to the page in the map div
	var map = L.map('map', {
		center: [38.538592, -121.75], // EDIT latitude, longitude to re-center map
		zoom: 15, // EDIT from 1 to 18 -- decrease to zoom out, increase to zoom in
		scrollWheelZoom: false,
        tap: false
		});

 /* Control panel to display map layers */
  var controlLayers = L.control.layers( null, null, {
    position: "topright",
    collapsed: false
  }).addTo(map);

  // display Carto basemap tiles with light features and labels
  var light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; <a href="https://carto.com/attribution">CARTO</a>'
  }).addTo(map); // EDIT - insert or remove ".addTo(map)" before last semicolon to display by default
  controlLayers.addBaseLayer(light, 'Carto Light basemap');

  var OpenStreetMap_Mapnik = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
	maxZoom: 19,
	attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
});// EDIT - insert or remove ".addTo(map)" before last semicolon to display by default
  controlLayers.addBaseLayer(OpenStreetMap_Mapnik, 'OSM basemap');


  // see more basemap options at https://leaflet-extras.github.io/leaflet-providers/preview/
new L.GPX(
  'https://assets.codepen.io/2511086/Mendick+Hill-compressed.gpx',
  {
    async: true,
    marker_options: {
      startIconUrl: 'https://cdn.jsdelivr.net/npm/leaflet-gpx@1.7.0/pin-icon-start.png',
      endIconUrl: 'https://cdn.jsdelivr.net/npm/leaflet-gpx@1.7.0/pin-icon-end.png',
      shadowUrl: 'https://cdn.jsdelivr.net/npm/leaflet-gpx@1.7.0/pin-shadow.png'
    }
  }
).on('loaded', function(e) {
  map.fitBounds(e.target.getBounds());
}).addTo(map);


      // URL to your GPX file or the GPX itself as a XML string.
      const url = './demo.gpx';
      const options = {
        async: true,
        polyline_options: { color: 'red' },
      };

      new GPX(url, options).on('loaded', (e) => {
        map.fitBounds(e.target.getBounds());
      }).addTo(map)
	
</script>



</body>
</html>
